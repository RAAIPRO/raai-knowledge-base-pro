  </defs>
  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="160" fill="url(#acc)" filter="url(#blur)"/>
  <circle cx="180" cy="520" r="180" fill="url(#acc)" filter="url(#blur)"/>
  <rect x="72" y="72" width="1136" height="496" rx="28" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.10)"/>
  <text x="108" y="128" class="brand">RAAI • OPENCLAW SKILL</text>
