    </div>
  </foreignObject>
  <rect x="108" y="408" width="260" height="54" rx="27" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="388" y="408" width="180" height="54" rx="27" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="588" y="408" width="210" height="54" rx="27" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
