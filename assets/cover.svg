      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="acc" x1="160" y1="120" x2="1080" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="45"/></filter>
    <style>
